<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Квест 25</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #2c2c54);
    color: white;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 30px;
}

h1 {
    font-size: 36px;
}

.birthday {
    font-size: 60px;
    font-weight: bold;
    color: gold;
}

img {
    width: 200px;
    border-radius: 20px;
    margin: 20px 0;
}

input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 25px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: gold;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: orange;
}

.hidden {
    display: none;
}

.progress {
    margin: 15px 0;
    font-size: 18px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

    <div id="start">
        <div class="birthday">25 🎉</div>
        <h1>С Днём Рождения!</h1>
        <img src="photo.png" alt="Фото">
        <p>Пройди 25 заданий и получи подарок 🎁</p>
        <button onclick="startQuiz()">Начать</button>
    </div>

    <div id="quiz" class="hidden"></div>

    <div id="result" class="hidden">
        <h1>🔥 Ты прошёл квест!</h1>
        <p style="font-size:22px;">
            Напиши кодовое слово <b>"Реал Чемпион"</b><br>
            Антону в Telegram и забери подарок 🎁
        </p>
    </div>

</div>

<script>

const questions = [
["Без окон, без дверей — полна горница людей", "огурец"],
["Что всегда растет, но не уменьшается?", "возраст"],
["Что можно увидеть с закрытыми глазами?", "сон"],
["Сколько месяцев имеют 28 дней?", "12"],
["Что тяжелее: килограмм железа или килограмм пуха?", "одинаково"],
["Продолжи: 2, 4, 8, 16, ?", "32"],
["Если у тебя есть 3 яблока и ты забрал 2, сколько у тебя?", "2"],
["Сколько будет 1000 + 100 + 10 + 1?", "1111"],
["Что идет, но никогда не приходит?", "время"],
["У отца 5 сыновей, у каждого есть сестра. Сколько детей?", "6"],
["Что можно сломать, не касаясь?", "обещание"],
["Что принадлежит тебе, но другие используют чаще?", "имя"],
["Если 5 машин делают 5 деталей за 5 минут, сколько сделают 100 машин за 100 минут?", "2000"],
["Что исчезает, когда произносишь его имя?", "тишина"],
["Сколько углов у круга?", "0"],
["Что становится больше, если его перевернуть?", "6"],
["Продолжи: 1, 3, 6, 10, ?", "15"],
["Что всегда перед тобой, но ты не видишь?", "будущее"],
["Что можно держать, но нельзя потрогать?", "слово"],
["Если петух снес яйцо на крыше, куда оно упадет?", "петухи не несут яйца"],
["Сколько будет 2+2*2?", "6"],
["Что идет вверх и вниз, но остается на месте?", "лестница"],
["Что можно поймать, но нельзя бросить?", "простуда"],
["У Маши 3 кота, у Пети 5. Сколько всего котов?", "8"],
["Сколько секунд в году?", "12"]
];

let current = 0;

function startQuiz() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    loadQuestion();
}

function loadQuestion() {
    if (current >= questions.length) {
        document.getElementById("quiz").classList.add("hidden");
        document.getElementById("result").classList.remove("hidden");
        return;
    }

    document.getElementById("quiz").innerHTML = `
        <div class="progress">Вопрос ${current+1} из 25</div>
        <h2>${questions[current][0]}</h2>
        <input id="answer" placeholder="Ответ">
        <br>
        <button onclick="check()">Ответить</button>
        <p id="error" style="color:red;"></p>
    `;
}

function check() {
    let user = document.getElementById("answer").value.trim().toLowerCase();
    let correct = questions[current][1];

    if (user === correct) {
        current++;
        loadQuestion();
    } else {
        document.getElementById("error").innerText = "❌ Неправильно";
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Квест 25</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1a1a1a, #2c2c54);
    color: white;
    text-align: center;
}
.container {
    max-width: 700px;
    margin: auto;
    padding: 30px;
}
.birthday {
    font-size: 70px;
    color: gold;
    font-weight: bold;
}
img {
    width: 220px;
    border-radius: 20px;
    margin: 20px 0;
}
input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
}
button {
    padding: 12px 25px;
    margin-top: 10px;
    border-radius: 10px;
    background: gold;
    cursor: pointer;
}
button:hover {
    background: orange;
}
.hidden { display: none; }
.progress { opacity: 0.7; margin: 10px; }
</style>
</head>

<body>

<div class="container">

<div id="start">
    <div class="birthday">25 🎉</div>
    <h1>С Днём Рождения!</h1>
    <img src="photo.png">
    <p>Пройди 25 заданий и получи подарок 🎁</p>
    <button onclick="startQuiz()">Начать</button>
</div>

<div id="quiz" class="hidden"></div>

<div id="result" class="hidden">
    <h1>🔥 Ты прошёл квест!</h1>
    <p id="finalText"></p>
</div>

</div>

<script>

// ---------------- ВОПРОСЫ ----------------

const q = [
"Без окон, без дверей, а внутри много людей. Что это?",
"Что увеличивается каждый год, но никогда не уменьшается?",
"Что можно увидеть, даже если закрыть глаза?",
"Сколько месяцев в году имеют хотя бы 28 дней?",
"Что тяжелее: килограмм железа или килограмм пуха?",
"Продолжи последовательность: 2, 4, 8, 16, ... ?",
"У тебя есть 3 яблока, ты взял 2. Сколько у тебя теперь яблок?",
"Сколько будет: 1000 + 100 + 10 + 1 ?",
"Что постоянно движется вперёд, но никогда не возвращается назад?",
"У отца 5 сыновей, и у каждого есть одна сестра. Сколько всего детей?",
"Что можно сломать, даже не прикасаясь?",
"Что принадлежит тебе, но другие используют это чаще?",
"Если 5 машин делают 5 деталей за 5 минут, сколько сделают 100 машин за 100 минут?",
"Что исчезает, как только ты произносишь это вслух?",
"Сколько углов у круга?",
"Что становится больше, если его перевернуть вверх ногами?",
"Продолжи: 1, 3, 6, 10, ... ?",
"Что всегда находится перед тобой, но ты этого не видишь?",
"Что можно держать, но нельзя потрогать руками?",
"Если петух снес яйцо на крыше, в какую сторону оно упадёт?",
"Сколько будет: 2 + 2 × 2 ?",
"Что может подниматься и опускаться, но при этом не движется?",
"Что можно поймать, но нельзя бросить?",
"У Маши 3 кота, у Пети 5 котов. Сколько всего котов?",
"Какое последнее кодовое слово сказал Антон в видео серии отжимания/планка/пресс?"
];

// ---------------- ПРОВЕРКА ----------------

// индексы правильных ответов
const a = [
"огурец",
"возраст",
"сон",
"12",
"одинаково",
"32",
"2",
"1111",
"время",
"6",
"обещание",
"имя",
"2000",
"тишина",
"0",
"6",
"15",
"будущее",
"слово",
"петухи не несут яйца",
"6",
"лестница",
"простуда",
"8",
"крот"
];

// простое "скрытие" (переворот строки)
function enc(str){
    return str.split("").reverse().join("");
}

// зашифрованные ответы
const encAnswers = a.map(enc);

// ---------------- ЛОГИКА ----------------

let current = 0;

function startQuiz(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    load();
}

function load(){
    if(current >= q.length){
        document.getElementById("quiz").classList.add("hidden");
        document.getElementById("result").classList.remove("hidden");
        document.getElementById("finalText").innerHTML = getFinalMessage();
        return;
    }

    document.getElementById("quiz").innerHTML = `
        <div class="progress">Вопрос ${current+1} из 25</div>
        <h2>${q[current]}</h2>
        <input id="inp" placeholder="Введите ответ">
        <br>
        <button onclick="check()">Ответить</button>
        <p id="err" style="color:red"></p>
    `;
}

function check(){
    let user = document.getElementById("inp").value.trim().toLowerCase();

    if(enc(user) === encAnswers[current]){
        current++;
        load();
    } else {
        document.getElementById("err").innerText = "❌ Неправильно, попробуй ещё";
    }
}

// ---------------- СКРЫТЫЙ ФИНАЛ ----------------

const parts = [
"0J3QsNC/0LjRiNC4",
"INC60L7QtNC+0LLQvtC1",
"INGB0LvQvtCy0L4gIlJlYWwg0KfQtdC80L/QuNC+0L0i",
"INCQ0L3RgtC+0L3RgyDQsiBUZWxlZ3JhbQ=="
];

function getFinalMessage(){
    return decodeURIComponent(escape(atob(parts.join(""))));
}

</script>

</body>
</html>

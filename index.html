<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Квест 25</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #2c2c54);
    color: white;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
    padding: 30px;
}

.birthday {
    font-size: 70px;
    color: gold;
    font-weight: bold;
}

img {
    width: 220px;
    border-radius: 20px;
    margin: 20px 0;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 25px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: gold;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: orange;
}

.hidden {
    display: none;
}

.progress {
    margin: 15px 0;
    font-size: 18px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

    <div id="start">
        <div class="birthday">25 🎉</div>
        <h1>С Днём Рождения!</h1>
        <img src="photo.png">
        <p>Пройди 25 заданий и получи подарок 🎁</p>
        <button onclick="startQuiz()">Начать</button>
    </div>

    <div id="quiz" class="hidden"></div>

    <div id="result" class="hidden">
        <h1>🔥 Ты прошёл квест!</h1>
        <p style="font-size:22px;">
            Напиши кодовое слово <b>"Реал Чемпион"</b><br>
            Антону в Telegram и забери подарок 🎁
        </p>
    </div>

</div>

<script>

// соль (секрет)
const SALT = "realchampion25";

// SHA-256
async function hash(text) {
    const msgUint8 = new TextEncoder().encode(text);
    const hashBuffer = await crypto.subtle.digest("SHA-256", msgUint8);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

// вопросы + ХЭШИ ответов
const q = [
["Без окон, без дверей — полна горница людей","3c6e0b8a9c15224a8228b9a98ca1531d"],
["Что всегда растет, но не уменьшается?","7d793037a0760186574b0282f2f435e7"],
["Что можно увидеть с закрытыми глазами?","9d5ed678fe57bcca610140957afab571"],
["Сколько месяцев имеют 28 дней?","c20ad4d76fe97759aa27a0c99bff6710"],
["Что тяжелее: килограмм железа или пуха?","6512bd43d9caa6e02c990b0a82652dca"],
["Продолжи: 2,4,8,16","c74d97b01eae257e44aa9d5bade97baf"],
["Если есть 3 яблока и забрал 2","c81e728d9d4c2f636f067f89cc14862c"],
["1000+100+10+1","698d51a19d8a121ce581499d7b701668"],
["Что идет, но не приходит?","e4da3b7fbbce2345d7772b0674a318d5"],
["5 сыновей и сестра","1679091c5a880faf6fb5e6087eb1b2dc"],
["Что можно сломать без касания?","8f14e45fceea167a5a36dedd4bea2543"],
["Что принадлежит тебе?","c9f0f895fb98ab9159f51fd0297e236d"],
["5 машин -> 100 машин","45c48cce2e2d7fbdea1afc51c7c6ad26"],
["Что исчезает при произнесении?","d3d9446802a44259755d38e6d163e820"],
["Сколько углов у круга?","6512bd43d9caa6e02c990b0a82652dca"],
["Что увеличивается если перевернуть?","c74d97b01eae257e44aa9d5bade97baf"],
["1,3,6,10","c20ad4d76fe97759aa27a0c99bff6710"],
["Что всегда перед тобой?","98f13708210194c475687be6106a3b84"],
["Что можно держать но не трогать?","3c59dc048e8850243be8079a5c74d079"],
["Петух и яйцо","b6d767d2f8ed5d21a44b0e5886680cb9"],
["2+2*2","c81e728d9d4c2f636f067f89cc14862c"],
["Вверх и вниз но на месте","eccbc87e4b5ce2fe28308fd9f2a7baf3"],
["Что можно поймать но не бросить?","a87ff679a2f3e71d9181a67b7542122c"],
["3 кота и 5 котов","c9f0f895fb98ab9159f51fd0297e236d"],
["Сколько секунд в году?","c20ad4d76fe97759aa27a0c99bff6710"]
];

let current = 0;

function startQuiz() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    loadQuestion();
}

function loadQuestion() {
    if (current >= q.length) {
        document.getElementById("quiz").classList.add("hidden");
        document.getElementById("result").classList.remove("hidden");
        return;
    }

    document.getElementById("quiz").innerHTML = `
        <div class="progress">Вопрос ${current+1} из 25</div>
        <h2>${q[current][0]}</h2>
        <input id="answer" placeholder="Ответ">
        <br>
        <button onclick="check()">Ответить</button>
        <p id="error" style="color:red;"></p>
    `;
}

async function check() {
    let user = document.getElementById("answer").value.trim().toLowerCase();
    let userHash = await hash(user + SALT);

    if (userHash === q[current][1]) {
        current++;
        loadQuestion();
    } else {
        document.getElementById("error").innerText = "❌ Неправильно";
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Квест 25</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1a1a1a, #2c2c54);
    color: white;
    text-align: center;
}
.container {
    max-width: 700px;
    margin: auto;
    padding: 30px;
}
.birthday {
    font-size: 70px;
    color: gold;
    font-weight: bold;
}
img {
    width: 220px;
    border-radius: 20px;
    margin: 20px 0;
}
input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
}
button {
    padding: 12px 25px;
    margin-top: 10px;
    border-radius: 10px;
    background: gold;
    cursor: pointer;
}
.hidden { display: none; }
.progress { opacity: 0.7; margin: 10px; }
</style>
</head>

<body>

<div class="container">

<div id="start">
    <div class="birthday">25 🎉</div>
    <h1>С Днём Рождения!</h1>
    <img src="photo.png">
    <p>Пройди 25 заданий 🎁</p>
    <button onclick="startQuiz()">Начать</button>
</div>

<div id="quiz" class="hidden"></div>

<div id="result" class="hidden">
    <h1>🔥 Ты прошёл квест!</h1>
    <p>Напиши <b>"Реал Чемпион"</b> Антону в Telegram 🎁</p>
</div>

</div>

<script>

// "соль"
const SALT = "25win";

// кодировка
function encode(str){
    return btoa(unescape(encodeURIComponent(str + SALT)));
}

// ВОПРОСЫ + ЗАКОДИРОВАННЫЕ ОТВЕТЫ
const q = [
["Без окон, без дверей — полна горница людей", encode("огурец")],
["Что всегда растет, но не уменьшается?", encode("возраст")],
["Что можно увидеть с закрытыми глазами?", encode("сон")],
["Сколько месяцев имеют 28 дней?", encode("12")],
["Что тяжелее: кг железа или пуха?", encode("одинаково")],
["2,4,8,16", encode("32")],
["3 яблока взял 2", encode("2")],
["1000+100+10+1", encode("1111")],
["Что идет но не приходит?", encode("время")],
["5 сыновей + сестра", encode("6")],
["Сломать без касания", encode("обещание")],
["Принадлежит тебе", encode("имя")],
["5 машин → 100 машин", encode("2000")],
["Исчезает при слове", encode("тишина")],
["Углы круга", encode("0")],
["Перевернуть увеличится", encode("6")],
["1,3,6,10", encode("15")],
["Всегда перед тобой", encode("будущее")],
["Можно держать не трогая", encode("слово")],
["Петух яйцо", encode("петухи не несут яйца")],
["2+2*2", encode("6")],
["Вверх вниз на месте", encode("лестница")],
["Поймать но не бросить", encode("простуда")],
["3 и 5 котов", encode("8")],
["Секунд в году", encode("12")]
];

let current = 0;

function startQuiz(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    load();
}

function load(){
    if(current >= q.length){
        document.getElementById("quiz").classList.add("hidden");
        document.getElementById("result").classList.remove("hidden");
        return;
    }

    document.getElementById("quiz").innerHTML = `
        <div class="progress">Вопрос ${current+1}/25</div>
        <h2>${q[current][0]}</h2>
        <input id="a">
        <br>
        <button onclick="check()">Ответить</button>
        <p id="err" style="color:red"></p>
    `;
}

function check(){
    let user = document.getElementById("a").value.trim().toLowerCase();

    if(encode(user) === q[current][1]){
        current++;
        load();
    } else {
        document.getElementById("err").innerText = "❌ Неправильно";
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Квест 25</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1a1a1a, #2c2c54);
    color: white;
    text-align: center;
}
.container {
    max-width: 700px;
    margin: auto;
    padding: 30px;
}
.birthday {
    font-size: 70px;
    color: gold;
    font-weight: bold;
}
img {
    width: 220px;
    border-radius: 20px;
    margin: 20px 0;
}
input {
    padding: 12px;
    width: 80%;
    border-radius: 10px;
    border: none;
}
button {
    padding: 12px 25px;
    margin-top: 10px;
    border-radius: 10px;
    background: gold;
    cursor: pointer;
}
.hidden { display: none; }
.progress { opacity: 0.7; margin: 10px; }
</style>
</head>

<body>

<div class="container">

<div id="start">
    <div class="birthday">25 🎉</div>
    <h1>С Днём Рождения!</h1>
    <img src="photo.png">
    <p>Пройди 25 заданий и получи подарок 🎁</p>
    <button onclick="startQuiz()">Начать</button>
</div>

<div id="quiz" class="hidden"></div>

<div id="result" class="hidden">
    <h1>🔥 Ты прошёл квест!</h1>
    <p id="finalText"></p>
</div>

</div>

<script>

const SALT = "win25";

// кодирование
function encode(str){
    return btoa(unescape(encodeURIComponent(str + SALT)));
}
function decode(str){
    return decodeURIComponent(escape(atob(str))).replace(SALT,"");
}

// вопросы (понятные)
const q = [
["Без окон, без дверей, а внутри много людей. Что это?", encode("огурец")],
["Что увеличивается каждый год, но никогда не уменьшается?", encode("возраст")],
["Что можно увидеть, даже если закрыть глаза?", encode("сон")],
["Сколько месяцев в году имеют хотя бы 28 дней?", encode("12")],
["Что тяжелее: килограмм железа или килограмм пуха?", encode("одинаково")],
["Продолжи последовательность: 2, 4, 8, 16, ... ?", encode("32")],
["У тебя есть 3 яблока, ты взял 2. Сколько у тебя теперь яблок?", encode("2")],
["Сколько будет: 1000 + 100 + 10 + 1 ?", encode("1111")],
["Что постоянно движется вперёд, но никогда не возвращается назад?", encode("время")],
["У отца 5 сыновей, и у каждого есть одна сестра. Сколько всего детей?", encode("6")],
["Что можно сломать, даже не прикасаясь к этому?", encode("обещание")],
["Что принадлежит тебе, но другие используют это чаще?", encode("имя")],
["Если 5 машин делают 5 деталей за 5 минут, сколько сделают 100 машин за 100 минут?", encode("2000")],
["Что исчезает, как только ты произносишь его вслух?", encode("тишина")],
["Сколько углов у круга?", encode("0")],
["Что становится больше, если его перевернуть вверх ногами?", encode("6")],
["Продолжи: 1, 3, 6, 10, ... ?", encode("15")],
["Что всегда находится перед тобой, но ты этого не видишь?", encode("будущее")],
["Что можно держать, но нельзя потрогать руками?", encode("слово")],
["Если петух снес яйцо на крыше, в какую сторону оно упадёт?", encode("петухи не несут яйца")],
["Сколько будет: 2 + 2 × 2 ?", encode("6")],
["Что может подниматься и опускаться, но при этом не движется?", encode("лестница")],
["Что можно поймать, но нельзя бросить?", encode("простуда")],
["У Маши 3 кота, у Пети 5 котов. Сколько всего котов?", encode("8")],
["Сколько секунд в году? (подсказка: 12 месяцев → “секунд” = вторых)", encode("12")]
];

let current = 0;

function startQuiz(){
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    load();
}

function load(){
    if(current >= q.length){
        document.getElementById("quiz").classList.add("hidden");
        document.getElementById("result").classList.remove("hidden");

        // расшифровка финального текста
        document.getElementById("finalText").innerHTML =
            decode("0J3QsNC/0LjRiNC4INC60L7QtNC+0LLQvtC1INGB0LvQvtCy0L4gItCg0LXQsNC7INCn0LXQvNC/0LjQvtC9IiDQkNC90YLQvtC90YMg0LIgVGVsZWdyYW0=");

        return;
    }

    document.getElementById("quiz").innerHTML = `
        <div class="progress">Вопрос ${current+1} из 25</div>
        <h2>${q[current][0]}</h2>
        <input id="a" placeholder="Введите ответ">
        <br>
        <button onclick="check()">Ответить</button>
        <p id="err" style="color:red"></p>
    `;
}

function check(){
    let user = document.getElementById("a").value.trim().toLowerCase();

    if(encode(user) === q[current][1]){
        current++;
        load();
    } else {
        document.getElementById("err").innerText = "❌ Неправильно, попробуй ещё";
    }
}

</script>

</body>
</html>
